version: "2.0"

services:
  web:
    image: elc0c0/lakuna-visualizer:latest
    expose:
      - port: 3000
        as: 80
        to:
          - global: true
    env:
      - PORT=3000
      - NODE_ENV=production
      - LLM_BACKEND=offline
      - ZERO_EXA_ENABLED=false
      - ZERO_EXA_MAX_PAY_USD=0.02
      # Do not put real API keys in this committed file.
      # For live LLM-backed research, set secrets in Akash Console if supported,
      # or deploy with an untracked deploy.local.yaml.

profiles:
  compute:
    web:
      resources:
        cpu:
          units: 1
        memory:
          size: 4Gi
        storage:
          size: 15Gi
  placement:
    dcloud:
      pricing:
        web:
          denom: uakt
          amount: 1000

deployment:
  web:
    dcloud:
      profile: web
      count: 1
